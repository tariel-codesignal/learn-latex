<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaTeX Editor</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div class="panels is-sidebar-collapsed">
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="panel sidebar">
          <section class="sidebar-files" id="file-tree"></section>
          <div class="sidebar-outline" id="outline"></div>
        </div>
        <div class="drag-handle" data-handle="file-editor" title="Resize panels"></div>
        <section class="panel editor" id="editor"></section>
        <div class="drag-handle" data-handle="editor-preview" title="Resize panels"></div>
        <section class="panel preview" id="preview-panel">
          <div class="preview-toolbar" id="preview-controls"></div>
          <div class="preview-scroll" id="preview"></div>
        </section>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
