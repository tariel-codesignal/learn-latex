<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaTeX Editor</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar" class="toolbar"></header>
      <div class="panels">
        <div class="panel sidebar">
          <section class="sidebar-files" id="file-tree"></section>
          <div class="sidebar-outline" id="outline"></div>
        </div>
        <div class="drag-handle" data-handle="file-editor" title="Resize panels"></div>
        <section class="panel editor" id="editor"></section>
        <div class="drag-handle" data-handle="editor-preview" title="Resize panels"></div>
        <section class="panel preview" id="preview"></section>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
